apiVersion: v1
kind: ConfigMap
metadata:
  name: repo-example-prod-frontend-assets
  namespace: repo-example-prod
  labels:
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
data:
  index.html: |

    <!doctype html>

    <html lang="en">

      <head>

        <meta charset="utf-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <title>Idea Time Sample</title>

        <style>

          :root {

            color-scheme: light;

            --bg: #f5efe3;

            --panel: #fffaf1;

            --ink: #1f2a2e;

            --muted: #5d6a70;

            --line: #d9cdb7;

            --accent: #0b6b66;

            --accent-soft: #d7efeb;

            --warn: #b04e32;

          }

    

          * {

            box-sizing: border-box;

          }

    

          body {

            margin: 0;

            font-family: "Segoe UI", sans-serif;

            background:

              radial-gradient(circle at top left, rgba(11, 107, 102, 0.12), transparent 32%),

              linear-gradient(180deg, #f8f1e7 0%, #f2eadc 100%);

            color: var(--ink);

          }

    

          main {

            max-width: 960px;

            margin: 0 auto;

            padding: 32px 20px 64px;

          }

    

          .hero {

            display: grid;

            gap: 16px;

            margin-bottom: 24px;

          }

    

          .eyebrow {

            display: inline-flex;

            width: fit-content;

            padding: 6px 10px;

            border-radius: 999px;

            background: var(--accent-soft);

            color: var(--accent);

            font-size: 12px;

            font-weight: 700;

            letter-spacing: 0.08em;

            text-transform: uppercase;

          }

    

          h1 {

            margin: 0;

            font-size: clamp(2rem, 6vw, 4rem);

            line-height: 0.95;

          }

    

          p {

            margin: 0;

            color: var(--muted);

          }

    

          .grid {

            display: grid;

            gap: 16px;

            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

          }

    

          .card {

            background: var(--panel);

            border: 1px solid var(--line);

            border-radius: 18px;

            padding: 18px;

            box-shadow: 0 10px 30px rgba(31, 42, 46, 0.06);

          }

    

          .card h2 {

            margin: 0 0 10px;

            font-size: 1rem;

          }

    

          .meta {

            display: grid;

            gap: 8px;

          }

    

          .meta div {

            display: flex;

            justify-content: space-between;

            gap: 12px;

            border-top: 1px solid var(--line);

            padding-top: 8px;

            font-size: 14px;

          }

    

          .meta strong {

            color: var(--ink);

          }

    

          form {

            display: grid;

            gap: 10px;

          }

    

          input,

          button {

            font: inherit;

          }

    

          input {

            width: 100%;

            border: 1px solid var(--line);

            border-radius: 12px;

            padding: 12px 14px;

            background: white;

          }

    

          button {

            border: 0;

            border-radius: 12px;

            padding: 12px 14px;

            background: var(--accent);

            color: white;

            cursor: pointer;

            font-weight: 700;

          }

    

          ul {

            margin: 0;

            padding-left: 18px;

            color: var(--muted);

          }

    

          .status-ok {

            color: var(--accent);

            font-weight: 700;

          }

    

          .status-bad {

            color: var(--warn);

            font-weight: 700;

          }

        </style>

      </head>

      <body>

        <main>

          <section class="hero">

            <span class="eyebrow" id="env-badge">loading</span>

            <h1 id="app-title">Idea Time Sample</h1>

            <p id="env-summary">

              Waiting for runtime environment.

            </p>

            <p>

              Runtime-configured frontend and backend sample for `idea`.

              The UI reads the backend address from injected config and shows both

              application time and database time.

            </p>

          </section>

    

          <section class="grid">

            <article class="card">

              <h2>Runtime</h2>

              <div class="meta">

                <div><span>Environment</span><strong id="app-env">-</strong></div>

                <div><span>API Base URL</span><strong id="api-base">-</strong></div>

                <div><span>Backend Health</span><strong id="health-state">checking</strong></div>

              </div>

            </article>

    

            <article class="card">

              <h2>Backend</h2>

              <div class="meta">

                <div><span>Backend Host</span><strong id="hostname">-</strong></div>

                <div><span>App Time</span><strong id="app-time">-</strong></div>

                <div><span>Database Time</span><strong id="database-time">-</strong></div>

                <div><span>Database Name</span><strong id="database-name">-</strong></div>

              </div>

            </article>

    

            <article class="card">

              <h2>Notes</h2>

              <p>

                In local compose, set <code>PUBLIC_API_BASE_URL=http://localhost:8080/api</code>.

                In `idea` platform runtime, inject <code>/api</code> and let the platform Caddy route it.

              </p>

            </article>

          </section>

        </main>

    

        <script src="/config.js"></script>

        <script src="/app.js"></script>

      </body>

    </html>

  app.js: |

    (function () {

      const config = window.__APP_CONFIG__ || {};

      const apiBase = config.PUBLIC_API_BASE_URL || "/api";

    

      const title = document.getElementById("app-title");

      const badge = document.getElementById("env-badge");

      const envSummary = document.getElementById("env-summary");

      const envValue = document.getElementById("app-env");

      const apiBaseValue = document.getElementById("api-base");

      const healthState = document.getElementById("health-state");

      const hostnameValue = document.getElementById("hostname");

      const appTimeValue = document.getElementById("app-time");

      const databaseTimeValue = document.getElementById("database-time");

      const databaseNameValue = document.getElementById("database-name");

    

      function apiUrl(path) {

        return apiBase.replace(/\/$/, "") + path;

      }

    

      async function loadRuntime() {

        title.textContent = config.APP_DISPLAY_NAME || "Idea Time Sample";

        badge.textContent = config.APP_ENV || "unknown";

        envValue.textContent = config.APP_ENV || "unknown";

        apiBaseValue.textContent = apiBase;

        envSummary.textContent = `This screen is running with the ${config.APP_ENV || "unknown"} environment.`;

    

        try {

          const response = await fetch(apiUrl("/healthz"));

    

          if (!response.ok) {

            throw new Error(`failed with status ${response.status}`);

          }

    

          const payload = await response.json();

          envSummary.textContent = `This screen is running with the ${payload.environment || config.APP_ENV || "unknown"} environment.`;

          healthState.textContent = payload.status === "ok" ? "healthy" : payload.status || "unknown";

          healthState.className = payload.status === "ok" ? "status-ok" : "status-bad";

          hostnameValue.textContent = payload.hostname || "-";

          appTimeValue.textContent = payload.appTime || "-";

          databaseTimeValue.textContent = payload.databaseTime || "-";

          databaseNameValue.textContent = payload.databaseName || "-";

        } catch (error) {

          healthState.textContent = "unreachable";

          healthState.className = "status-bad";

          hostnameValue.textContent = error.message;

          appTimeValue.textContent = "-";

          databaseTimeValue.textContent = "-";

          databaseNameValue.textContent = "-";

        }

      }

    

      loadRuntime();

      setInterval(loadRuntime, 5000);

    })();

  config.js.template: |

    window.__APP_CONFIG__ = {

      APP_ENV: "${APP_ENV}",

      APP_DISPLAY_NAME: "${APP_DISPLAY_NAME}",

      PUBLIC_API_BASE_URL: "${PUBLIC_API_BASE_URL}"

    };

  default.conf.template: |

    server {

        listen 80;

        server_name _;

    

        root /usr/share/nginx/html;

        index index.html;

    

        location = /config.js {

            add_header Cache-Control "no-store";

            try_files $uri =404;

        }

    

        location /api/ {

            proxy_pass http://backend:8080;

            proxy_http_version 1.1;

            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto $scheme;

        }

    

        location = /api {

            proxy_pass http://backend:8080;

            proxy_http_version 1.1;

            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto $scheme;

        }

    

        location / {

            try_files $uri /index.html;

        }

    }

  30-render-config.sh: |

    #!/bin/sh

    set -eu

    

    : "${APP_ENV:=dev}"

    : "${APP_DISPLAY_NAME:=Idea Time Sample}"

    : "${PUBLIC_API_BASE_URL:=/api}"

    

    export APP_ENV

    export APP_DISPLAY_NAME

    export PUBLIC_API_BASE_URL

    

    envsubst '${APP_ENV} ${APP_DISPLAY_NAME} ${PUBLIC_API_BASE_URL}' \

      < /usr/share/nginx/html/config.js.template \

      > /usr/share/nginx/html/config.js

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: repo-example-prod-backend-source
  namespace: repo-example-prod
  labels:
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
data:
  package.json: |

    {

      "name": "idea-dummy-backend",

      "version": "1.0.0",

      "private": true,

      "description": "Time and health backend for the idea platform sample app repo.",

      "scripts": {

        "start": "node server.js"

      },

      "dependencies": {

        "pg": "8.12.0"

      }

    }

  db.js: |

    const { Pool } = require("pg");

    

    const connectionString = process.env.DATABASE_URL;

    

    if (!connectionString) {

      throw new Error("DATABASE_URL must be set.");

    }

    

    const pool = new Pool({ connectionString });

    

    async function healthcheck() {

      await pool.query("SELECT 1");

    }

    

    async function readDatabaseTime() {

      const result = await pool.query(

        "select now() as database_time, current_database() as database_name"

      );

      return result.rows[0];

    }

    

    module.exports = {

      healthcheck,

      readDatabaseTime,

      pool,

    };

  server.js: |

    const http = require("http");

    const { URL } = require("url");

    const os = require("os");

    const { healthcheck, readDatabaseTime, pool } = require("./db");

    

    const port = Number(process.env.PORT || "8080");

    const appEnv = process.env.APP_ENV || "local";

    const apiBasePath = "/api";

    

    function json(response, statusCode, body) {

      response.writeHead(statusCode, {

        "Content-Type": "application/json; charset=utf-8",

      });

      response.end(JSON.stringify(body));

    }

    

    function buildPayload(databaseRow) {

      return {

        status: "ok",

        service: "idea-time-backend",

        environment: appEnv,

        appTime: new Date().toISOString(),

        databaseTime: databaseRow.database_time,

        databaseName: databaseRow.database_name,

        hostname: os.hostname(),

      };

    }

    

    async function start() {

      const server = http.createServer(async (request, response) => {

        const url = new URL(request.url, `http://${request.headers.host || "localhost"}`);

        const pathname = url.pathname;

    

        try {

          if (request.method === "GET" && pathname === "/") {

            json(response, 200, {

              service: "idea-time-backend",

              environment: appEnv,

              apiBasePath,

              message: "Use /api/time or /api/healthz.",

            });

            return;

          }

    

          if (request.method === "GET" && pathname === `${apiBasePath}/healthz`) {

            const databaseRow = await readDatabaseTime();

            json(response, 200, buildPayload(databaseRow));

            return;

          }

    

          if (request.method === "GET" && pathname === `${apiBasePath}/readyz`) {

            await healthcheck();

            json(response, 200, {

              status: "ready",

              service: "idea-time-backend",

              environment: appEnv,

              hostname: os.hostname(),

            });

            return;

          }

    

          if (request.method === "GET" && pathname === `${apiBasePath}/time`) {

            const databaseRow = await readDatabaseTime();

            json(response, 200, buildPayload(databaseRow));

            return;

          }

    

          json(response, 404, { error: "not found", path: pathname });

        } catch (error) {

          json(response, 500, { error: error.message, environment: appEnv });

        }

      });

    

      server.listen(port, "0.0.0.0", () => {

        console.log(`idea-time-backend listening on ${port}`);

      });

    }

    

    start().catch((error) => {

      console.error(error);

      pool.end().catch(() => {});

      process.exit(1);

    });

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-data
  namespace: repo-example-prod
  labels:
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: repo-example-prod
  labels:
    app.kubernetes.io/name: db
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: db
      idea.rnen.kr/project: repo-example
      idea.rnen.kr/environment: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db
        idea.rnen.kr/project: repo-example
        idea.rnen.kr/environment: prod
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: "idea_app_prod"
            - name: POSTGRES_USER
              value: "idea"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: repo-example-prod-runtime-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: db-data
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: repo-example-prod
  labels:
    app.kubernetes.io/name: db
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
spec:
  selector:
    app.kubernetes.io/name: db
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: repo-example-prod
  labels:
    app.kubernetes.io/name: backend
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      idea.rnen.kr/project: repo-example
      idea.rnen.kr/environment: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        idea.rnen.kr/project: repo-example
        idea.rnen.kr/environment: prod
    spec:
      initContainers:
        - name: install-deps
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              cp /src/package.json /work/package.json
              cp /src/db.js /src/server.js /work/
              cd /work
              npm install --omit=dev
          volumeMounts:
            - name: backend-source
              mountPath: /src
            - name: backend-work
              mountPath: /work
      containers:
        - name: backend
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              cd /app
              node server.js
          env:
            - name: PORT
              value: "8080"

            - name: APP_DISPLAY_NAME
              value: "Repo Example Prod"

            - name: APP_ENV
              value: "prod"

            - name: NODE_ENV
              value: "production"

            - name: POSTGRES_DB
              value: "idea_app_prod"

            - name: POSTGRES_USER
              value: "idea"

            - name: PUBLIC_API_BASE_PATH
              value: "/api"

            - name: PUBLIC_API_BASE_URL
              value: "/api"


            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: repo-example-prod-runtime-secrets
                  key: DATABASE_URL

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: repo-example-prod-runtime-secrets
                  key: POSTGRES_PASSWORD

          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: backend-work
              mountPath: /app
      volumes:
        - name: backend-source
          configMap:
            name: repo-example-prod-backend-source
        - name: backend-work
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: repo-example-prod
  labels:
    app.kubernetes.io/name: backend
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
spec:
  selector:
    app.kubernetes.io/name: backend
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: repo-example-prod
  labels:
    app.kubernetes.io/name: frontend
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      idea.rnen.kr/project: repo-example
      idea.rnen.kr/environment: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        idea.rnen.kr/project: repo-example
        idea.rnen.kr/environment: prod
    spec:
      initContainers:
        - name: prepare-frontend
          image: busybox:1.36
          command:
            - sh
            - -lc
            - |
              cp /src/index.html /www/index.html
              cp /src/app.js /www/app.js
              cp /src/config.js.template /www/config.js.template
              cp /src/default.conf.template /config/default.conf.template
              cp /src/30-render-config.sh /entrypoint/30-render-config.sh
              chmod +x /entrypoint/30-render-config.sh
          volumeMounts:
            - name: frontend-source
              mountPath: /src
            - name: frontend-www
              mountPath: /www
            - name: frontend-config
              mountPath: /config
            - name: frontend-entrypoint
              mountPath: /entrypoint
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          env:

            - name: APP_DISPLAY_NAME
              value: "Repo Example Prod"

            - name: APP_ENV
              value: "prod"

            - name: PUBLIC_API_BASE_URL
              value: "/api"

          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: frontend-www
              mountPath: /usr/share/nginx/html
            - name: frontend-config
              mountPath: /etc/nginx/templates
            - name: frontend-entrypoint
              mountPath: /docker-entrypoint.d
      volumes:
        - name: frontend-source
          configMap:
            name: repo-example-prod-frontend-assets
        - name: frontend-www
          emptyDir: {}
        - name: frontend-config
          emptyDir: {}
        - name: frontend-entrypoint
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: repo-example-prod
  labels:
    app.kubernetes.io/name: frontend
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
spec:
  selector:
    app.kubernetes.io/name: frontend
    idea.rnen.kr/project: repo-example
    idea.rnen.kr/environment: prod
  ports:
    - name: http
      port: 80
      targetPort: http
  type: LoadBalancer
